# ============================================
# Tresvita Todo Frontend - Development Values
# Minimal config for fast deployment
# ============================================

replicaCount: 1

image:
  repository: tresvita-todo-frontend
  pullPolicy: IfNotPresent
  tag: "latest"

fullnameOverride: "tresvita-todo-frontend"

# Use default service account for speed
serviceAccount:
  create: false
  name: "default"

service:
  type: ClusterIP
  port: 80
  targetPort: 80

# No ingress for dev - use port-forward
ingress:
  enabled: false

# Minimal resources for dev
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

autoscaling:
  enabled: false

# Disable configmap for dev (use default nginx config)
configMap:
  enabled: false

# Simplified probes for faster startup
readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

# Dev environment
env:
  - name: REACT_APP_API_URL
    value: "http://tresvita-todo-backend.backend.svc.cluster.local:8080/api"
  - name: NODE_ENV
    value: "development"
