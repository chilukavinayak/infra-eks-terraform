# ============================================
# Tresvita Todo Frontend - Development Values
# Simple ClusterIP service - use port-forward to access
# ============================================

replicaCount: 1

image:
  repository: tresvita-todo-frontend
  pullPolicy: IfNotPresent
  tag: "latest"

fullnameOverride: "tresvita-todo-frontend"

serviceAccount:
  create: true
  name: "frontend-sa"

service:
  type: ClusterIP
  port: 80
  targetPort: 80

# No ingress for dev - use port-forward
ingress:
  enabled: false

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false

# Dev environment - connect to backend internally
env:
  - name: REACT_APP_API_URL
    value: "http://tresvita-todo-backend.backend.svc.cluster.local:8080/api"
  - name: NODE_ENV
    value: "development"
  - name: REACT_APP_APP_NAME
    value: "Tresvita Todo (Dev)"
