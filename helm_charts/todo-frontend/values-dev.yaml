# ============================================
# Tresvita Todo Frontend - Development Values
# No custom domain - uses ALB DNS directly
# ============================================

replicaCount: 1

image:
  repository: tresvita-todo-frontend
  pullPolicy: IfNotPresent
  tag: "latest"

fullnameOverride: "tresvita-todo-frontend"

serviceAccount:
  create: true
  name: "frontend-sa"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "80"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false

# ALB Ingress without custom domain
# Access via ALB DNS name directly
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/tags: "Environment=dev,Project=tresvita-todo-app,ManagedBy=wissen-team"
  hosts:
    # Use wildcard - ALB will accept any host header
    - host: "*"
      paths:
        - path: /
          pathType: Prefix

# Dev environment - point to backend service internally
env:
  - name: REACT_APP_API_URL
    value: "http://tresvita-todo-backend.backend.svc.cluster.local:8080/api"
  - name: NODE_ENV
    value: "development"
  - name: REACT_APP_APP_NAME
    value: "Tresvita Todo (Dev)"
  - name: REACT_APP_VERSION
    value: "1.0.0-dev"
