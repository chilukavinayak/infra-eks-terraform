# ============================================
# Tresvita Todo Frontend - Production Values
# Managed by Wissen Team
# ============================================

# Production environment configuration
replicaCount: 3

image:
  repository: tresvita-todo-frontend
  pullPolicy: IfNotPresent
  tag: "latest"

fullnameOverride: "tresvita-todo-frontend"

serviceAccount:
  create: true
  name: "frontend-sa"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "80"

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 2

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: ""  # Add ACM certificate ARN here
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/tags: "Environment=prod,Project=tresvita-todo-app,ManagedBy=wissen-team"
  hosts:
    - host: app.tresvita.com
      paths:
        - path: /
          pathType: Prefix

# Production environment variables
env:
  - name: REACT_APP_API_URL
    value: "https://api.tresvita.com/api"
  - name: NODE_ENV
    value: "production"
  - name: REACT_APP_APP_NAME
    value: "Tresvita Todo"
  - name: REACT_APP_VERSION
    value: "1.0.0"
