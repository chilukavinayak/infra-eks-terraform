# ============================================
# Tresvita Todo Backend - Helm Values
# Managed by Wissen Team
# ============================================

# Default values for Tresvita Todo Backend
replicaCount: 2

image:
  repository: tresvita-todo-backend
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "tresvita-todo-backend"

serviceAccount:
  create: true
  annotations: {}
  name: "backend-sa"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/actuator/prometheus"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: ""
    alb.ingress.kubernetes.io/healthcheck-path: /api/actuator/health
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    # Tresvita specific tags
    alb.ingress.kubernetes.io/tags: "Environment=dev,Project=tresvita-todo-app,ManagedBy=wissen-team"
  hosts:
    - host: api.tresvita.local
      paths:
        - path: /api
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

pdb:
  enabled: true
  minAvailable: 1

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 0

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - tresvita-todo-backend
          topologyKey: kubernetes.io/hostname

# Environment variables
env:
  - name: SPRING_PROFILES_ACTIVE
    value: "dev"
  - name: SERVER_PORT
    value: "8080"
  - name: JAVA_OPTS
    value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0"
  - name: DB_HOST
    valueFrom:
      secretKeyRef:
        name: db-credentials
        key: host
        optional: true
  - name: DB_PORT
    valueFrom:
      secretKeyRef:
        name: db-credentials
        key: port
        optional: true
  - name: DB_NAME
    valueFrom:
      secretKeyRef:
        name: db-credentials
        key: database
        optional: true
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: db-credentials
        key: username
        optional: true
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db-credentials
        key: password
        optional: true

# Secrets
secret:
  enabled: true
  data:
    db-credentials:
      host: ""
      port: "5432"
      database: "tresvita_todo_db"
      username: ""
      password: ""

# ConfigMap
configMap:
  enabled: true
  data:
    application.yml: |
      server:
        servlet:
          context-path: /api
      management:
        endpoints:
          web:
            exposure:
              include: health,info,prometheus,metrics
        endpoint:
          health:
            show-details: always
            probes:
              enabled: true
        health:
          livenessstate:
            enabled: true
          readinessstate:
            enabled: true
      logging:
        level:
          com.tresvita: DEBUG
          root: INFO

# Probes
readinessProbe:
  httpGet:
    path: /api/actuator/health/readiness
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /api/actuator/health/liveness
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /api/actuator/health/liveness
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 30
