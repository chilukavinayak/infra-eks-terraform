# ============================================
# Tresvita Todo Backend - Production Values
# Managed by Wissen Team
# ============================================

# Production environment configuration
replicaCount: 3

image:
  repository: tresvita-todo-backend
  pullPolicy: IfNotPresent
  tag: "latest"

fullnameOverride: "tresvita-todo-backend"

serviceAccount:
  create: true
  name: "backend-sa"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 2

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: ""  # Add ACM certificate ARN here
    alb.ingress.kubernetes.io/healthcheck-path: /api/actuator/health
    alb.ingress.kubernetes.io/tags: "Environment=prod,Project=tresvita-todo-app,ManagedBy=wissen-team"
  hosts:
    - host: api.tresvita.com
      paths:
        - path: /api
          pathType: Prefix

# Production environment variables
env:
  - name: SPRING_PROFILES_ACTIVE
    value: "prod"
  - name: SERVER_PORT
    value: "8080"
  - name: JAVA_OPTS
    value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0"
  - name: LOG_LEVEL
    value: "INFO"
