# ============================================
# Tresvita Todo Backend - Development Values
# Managed by Wissen Team
# ============================================

# Development environment configuration
replicaCount: 2

image:
  repository: tresvita-todo-backend
  pullPolicy: IfNotPresent
  tag: "latest"

fullnameOverride: "tresvita-todo-backend"

serviceAccount:
  create: true
  name: "backend-sa"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /api/actuator/health
    alb.ingress.kubernetes.io/tags: "Environment=dev,Project=tresvita-todo-app,ManagedBy=wissen-team"
  hosts:
    - host: api-dev.tresvita.local
      paths:
        - path: /api
          pathType: Prefix

# Development environment variables
env:
  - name: SPRING_PROFILES_ACTIVE
    value: "dev"
  - name: SERVER_PORT
    value: "8080"
  - name: JAVA_OPTS
    value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0"
  - name: LOG_LEVEL
    value: "DEBUG"
