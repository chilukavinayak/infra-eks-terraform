# ============================================
# Tresvita Todo Backend - Development Values
# Minimal config for fast deployment
# ============================================

replicaCount: 1

image:
  repository: tresvita-todo-backend
  pullPolicy: IfNotPresent
  tag: "latest"

fullnameOverride: "tresvita-todo-backend"

# Use default service account
serviceAccount:
  create: false
  name: "default"

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

# No ingress for dev
ingress:
  enabled: false

# Minimal resources
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false

# Disable secret for dev (uses H2 in-memory)
secret:
  enabled: false

# Simplified probes
readinessProbe:
  httpGet:
    path: /api/actuator/health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5

livenessProbe:
  httpGet:
    path: /api/actuator/health
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

# Dev environment
env:
  - name: SPRING_PROFILES_ACTIVE
    value: "dev"
  - name: SERVER_PORT
    value: "8080"
  - name: JAVA_OPTS
    value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
