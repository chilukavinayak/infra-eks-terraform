# ============================================
# Tresvita Todo Backend - Development Values
# No custom domain - uses internal service
# ============================================

replicaCount: 1

image:
  repository: tresvita-todo-backend
  pullPolicy: IfNotPresent
  tag: "latest"

fullnameOverride: "tresvita-todo-backend"

serviceAccount:
  create: true
  name: "backend-sa"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: false

# No ingress for backend in dev - frontend accesses via internal service
ingress:
  enabled: false

# Development environment variables
env:
  - name: SPRING_PROFILES_ACTIVE
    value: "dev"
  - name: SERVER_PORT
    value: "8080"
  - name: JAVA_OPTS
    value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
  - name: LOG_LEVEL
    value: "DEBUG"
